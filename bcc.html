<!DOCTYPE html>
<html>
  <head>

    ></script>

      gtag("config", "UA-31100913-2");

    <title>[LIVE] - BCC</title>
    
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" type="text/css" href="/style.css" />

  <body>
    <header>
      <a class="canyon-toggle" href="/">LCC</a>
      <road-status>
        <img
          src="http://www.udottraffic.utah.gov/AnimatedGifs/100033.gif"
          alt="SR-190 highway status"
        />
      </road-status>
    </header>
    <section id="container">
      <camera-feed tabindex="1" reload="30000">
        <img
          src="https://udottraffic.utah.gov/1_devices/aux14605.jpeg"
          alt="Wasatch Blvd @ BCC"
          loading="lazy"
        />
        <h4>Wasatch Blvd @ BCC</h4>
      </camera-feed>
      <camera-feed tabindex="2">

          src="https://udottraffic.utah.gov/1_devices/aux16212.jpeg"

          loading="lazy"

        <h4>Dogwood</h4>
      </camera-feed>
      <camera-feed tabindex="3">
        <img
          src="https://udottraffic.utah.gov/1_devices/aux16213.jpeg"
          alt="S Curves"
          loading="lazy"
        />

      </camera-feed>
      <camera-feed tabindex="4">
        <img
          src="https://udottraffic.utah.gov/1_devices/aux16215.jpeg"
          alt="Cardiff Fork"
          loading="lazy"
        />

      </camera-feed>
      <camera-feed tabindex="5">
        <img
          src="https://udottraffic.utah.gov/1_devices/aux16216.jpeg"
          alt="Silver Fork"
          loading="lazy"
        />

      </camera-feed>

          src="https://webcams.solitudemountain.com/mbl.jpg"

          loading="lazy"
        />

    <the-overlay></the-overlay>
