  html {
    margin: 0;
    background-color: #fff;
    font-family: Arial,sans-serif;
    font-size: 14px;
    line-height: 20px;
    color: #333;
  }

  body {
    margin: 0 auto;
  }

  #cameras {
    margin: 2em 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  camera-feed {
    max-width: 320px;
    position: relative;
    margin: 0.3em;
    overflow: hidden;
    border-radius: 10px;
    background-color: black;
    box-shadow: 0px 0px 1px 0px rgba(0,0,0,0.3);
    transition: all .2s ease;
    cursor: zoom-in;
    padding-bottom: 1em;
    background: white;
  }

  @media only screen and (max-width: 667px) {
    camera-feed {
      width: 100%;
      max-width: initial;
      cursor: auto;
    }
  }

  camera-feed:hover {
    box-shadow: 0px 0px 2px 0px rgba(0,0,0,0.6);
  }

  camera-feed h4 {
    position: absolute;
    top: 0px;
    left: 0px;
    color: black;
    margin: 0;
    padding: 0;
    background: rgba(255,255,255,1);
    font-size: 14px;
    width: 100%;
    font-weight: 300;
    line-height: 2em;
    text-align: center;
    transition: all .2s ease;
  }

  camera-feed:hover h4 {
    font-size: 10px;
    line-height: 1.5em;
  }

  camera-feed img {
    min-height: 180px;
    min-width: 320px;
    display: block;
    width: 100%;
    background: black;
  }

  road-status {
    height: 100px;
    display: block;
    position: sticky;
    top: 0;
    left: 0px;
    z-index: 2;
    opacity: 0.9;
    width: 100%;
    transition: opacity 0.2s ease;
    margin: 2em 0;
    border-bottom: none;
  }

  road-status img {
    height: 100px;
    margin: 0 auto;
    display: block;
    position: relative;
  }

  road-status.floater {
    height: 38px;
    background: white;
  }

  road-status.floater img { height: 38px; }

  road-status.scrolling-back-up, road-status.scrolling-back-up img {
    height: 100px;
  }

  the-overlay {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    z-index: 3;
    display: none;
    cursor: zoom-out;
    backdrop-filter: blur(20px);
  }

  the-overlay h4 {
    display: none;
  }

  the-overlay camera-feed {
    margin: 0;
  }

  the-overlay img {
    cursor: zoom-out;
    background-color: transparent;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    max-width: 100wh;
    max-height: 100vh;
    object-fit: contain;
  }
</style>

<script type="module">
  (async function hotReload() {
    const etag = async () => (await fetch('/', { method: 'HEAD' })).headers.get('etag');
    const sleep = async time => new Promise(resolve => setTimeout(resolve, time));
    const original = await etag();

    while (original === await etag()) {
      await sleep(location.port === '8888' ? 1000 : 60000);
    }

    location.reload();
  }());
</script>
