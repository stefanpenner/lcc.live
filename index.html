<style>
  html {
    margin: 0;
    background-color: #fff;
    font-family: Arial,sans-serif;
    font-size: 14px;
    line-height: 20px;
    color: #333;
  }

  body {
    margin: 0 auto;
  }

  .zoomed {
    cursor: zoom-out;
  }

  #cameras {
    margin: 2em 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .lcc-camera {
    max-width: 320px;
    position: relative;
    margin: 0.3em;
    overflow: hidden;
    border-radius: 10px;
    background-color: black;
    box-shadow: 0px 0px 1px 0px rgba(0,0,0,0.3);
    transition: all .2s ease;
    cursor: zoom-in;
    padding-bottom: 1em;
    background: white;
  }

  @media only screen and (max-width: 667px) {
    .lcc-camera {
      width: 100%;
      max-width: initial;
      cursor: auto;
    }

    .zoomed {
      cursor: auto;
    }
    .zoomed {
      cursor: auto;
    }
  }

  .lcc-camera:hover {
    box-shadow: 0px 0px 2px 0px rgba(0,0,0,0.6);
  }

  .lcc-camera h4 {
    position: absolute;
    top: 0px;
    left: 0px;
    color: black;
    margin: 0;
    padding: 0;
    background: rgba(255,255,255,1);
    font-size: 14px;
    width: 100%;
    font-weight: 300;
    line-height: 2em;
    text-align: center;
    transition: all .2s ease;
  }

  .lcc-camera.zoomed h4, .lcc-camera.zoomed:hover h4 {
    font-size: 5px;
    line-height: 1.5em;
  }

  .lcc-camera:hover h4 {
    font-size: 10px;
    line-height: 1.5em;
  }

  .lcc-camera img {
    min-height: 50px;
    display: block;
    width: 100%;
    background: black;
  }

  #road-status {
    height: 100px;
    display: block;
    position: sticky;
    top: 0;
    left: 0px;
    z-index: 2;
    opacity: 0.9;
    width: 100%;
    transition: opacity 0.2s ease;
  }

  #road-status img {
    height: 100px;
    margin: 0 auto;
    display: block;
    position: relative;
  }

  #road-status.top {
    margin: 2em 0;
    border-bottom: none;
  }


  #road-status.floater {
    height: 38px;
    background: white;
  }
  #road-status.floater img { height: 38px; }

  #road-status.scrolling-back-up, #road-status.scrolling-back-up img {
    height: 100px;
  }

  #zoom {
    margin: 0 auto;
    width: 400px;
  }

  #zoom button {
    width: 30%
  }
</style>

<script module>
  function fragment(string) {
    const template = document.createElement('template');
    template.innerHTML = string;
    return template.content
  }

  async function assert(assertion, message) {
    const value = await assertion();
    const string = assertion.toString().replace('() => ', '');
    if (value) {
      console.log(`pass: ${string}`)
      return true;
    } else {
      const message = `expected: 'true' but got: '${value}' for: ${string}`;
      console.log(`fail: ${message}`);
    }
  }

  async function test(name, execution) {
    const groupName = `test: ${name}`;
    console.group(groupName);
    await execution();
    console.groupEnd(groupName);
  }

  const cameraStyle = document.createElement('style');

  function allImages() {
    return document.querySelectorAll('img');
  }

  document.addEventListener('click', () => {
    if (scaled) {
        scaled.style.transform = "scale(1)"
        scaled = null
      }
  });

  let scaled = null;
  let index = 1;

  function zoomIn(element) {
    if (window.innerWidth < 660) { return; }
    element.style.transform = 'scale(3)';
    element.style.zIndex = index++;
    element.setAttribute('class', 'lcc-camera zoomed')
    scaled = element;
  }

  function zoomOut(element) {
    scaled = element;
    scaled.style.transform = 'scale(1)'
    scaled.style.zIndex = 0;
    scaled.setAttribute('class', 'lcc-camera')
  }

  function handleZoom(e) {
      const camera = e.target.closest('.lcc-camera');
      if (camera === null) {
        return;
      }


      if (scaled) {
        if (scaled === camera) {
          zoomOut(scaled);
          return;
        }
        zoomOut(scaled);
      }
      //camera.scrollIntoView();
      zoomIn(camera);
      e.stopPropagation();
  }

  test('handleZoom', () => {
    const doc = fragment`
    <div id="cameras">
      <div class="lcc-camera">
        <img>
      </div>
      <div class="lcc-camera">
        <img>
    </div>
    `
    let stopPropagationWasCalled = false;
    const camera = doc.querySelector('.lcc-camera:first-child');
    const otherCamera = doc.querySelector('.lcc-camera:last-child');

    handleZoom({
      target: camera,
      stopPropagation() { stopPropagationWasCalled = true; }
    });

    assert(() => camera.style.transform.includes('scale(3)'));
    assert(() => !otherCamera.style.transform.includes('scale(3)'));
    assert(() => stopPropagationWasCalled);
    assert(() => camera.className.includes('zoomed'));
    assert(() => !otherCamera.className.includes('zoomed'));
    assert(() => scaled === camera);
    assert(() => scaled !== otherCamera);

    stopPropagationWasCalled = false;

    handleZoom({
      target: otherCamera,
      stopPropagation() { stopPropagationWasCalled = true; }
    });

    assert(() => otherCamera.style.transform.includes('scale(3)'));
    assert(() => !camera.style.transform.includes('scale(3)'));
    assert(() => stopPropagationWasCalled);
    assert(() => otherCamera.className.includes('zoomed'));
    assert(() => !camera.className.includes('zoomed'));
    assert(() => scaled === otherCamera);
    assert(() => scaled !== camera);
  });

  document.body.addEventListener('click', handleZoom);

  allImages().forEach(img => {
    img._last = Date.now();
    img._oldsrc = img.src;
  });

  function reloadImages() {
    allImages().forEach(img=> {
      const reload = Number(img.dataset.reload) || 30000;
      const now = Date.now();
      if (now - img._last > reload) {
        img._last = now;
        img.src = `${img._oldsrc}?_=${now}`;
        console.log("update")
      }
    });

    setTimeout(reloadImages, 500);
  }

  const HOT_RELOADTIMEOUT = location.hostname === 'localhost'  ?  200 : 60000;

  // TODO: test
  function floater() {
    let lastScrollTop = 0;
    document.addEventListener('scroll', function(e) {
      const { classList } = document.querySelector('#road-status');
      const { scrollTop } = document.body.parentElement;
      const scrollingDown = lastScrollTop - scrollTop < 0;

      if (scrollTop <= 5) {
        classList.add('top');
        classList.remove('floater');
        document.body.classList.remove('floater')
      } else {
        document.body.classList.remove('floater')
        classList.remove('top');
        classList.add('floater');
      }

      lastScrollTop = scrollTop;
    });
  }

  async function main() {
    setTimeout(reloadImages, 500);
    floater();
    hotReload();
  }

  async function hotReload() {
    const etag = async () => (await fetch("/", { method: "HEAD" })).headers.get('etag');
    const sleep = async time => new Promise(resolve => setTimeout(resolve, time));
    const original = await etag();

    while (original === await etag()) {
      await sleep(location.port === "8888" ? 1000 : 60000);
    }

    location.reload();
  }

  main();
</script>
