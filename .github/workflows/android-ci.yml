name: Android CI

on:
  push:
    branches: [ master ]
    paths:
      - 'android/**'
      - 'MODULE.bazel'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'android/**'
      - 'MODULE.bazel'
      - '.github/workflows/android-ci.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 36.1.0

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-disk-cache
            ~/.cache/bazel-repo
          key: bazel-android-${{ runner.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: |
            bazel-android-${{ runner.os }}-

      - name: Build debug APK
        run: bazel build //android:app_debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: bazel-bin/android/app_debug.apk
